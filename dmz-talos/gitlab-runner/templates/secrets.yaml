apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-secret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-secret
  data:
  - secretKey: runner-token
    remoteRef:
      key: kv/gitlab/runner
      property: personal-runner-token
  - secretKey: runner-registration-token
    remoteRef:
      key: kv/gitlab/runner
      property: personal-runner-token
