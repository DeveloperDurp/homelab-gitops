apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-lapi-key
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: crowdsec-lapi-key
  data:
    - secretKey: lapi-key
      remoteRef:
        key: kv/crowdsec/api
        property: key